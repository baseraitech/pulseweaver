<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulseScale {
        0%, 100% { transform: scale(0.85); }
        50% { transform: scale(1.15); }
      }
      @keyframes glowAlpha {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      .pulse-ring {
        animation: pulseScale 0.9s ease-in-out infinite alternate;
        transform-origin: center;
      }
      .glow-stroke {
        animation: glowAlpha 0.7s ease-in-out infinite alternate;
      }
    </style>
  </defs>

  <!-- Cyan ring (left) -->
  <g class="pulse-ring">
    <circle cx="42" cy="60" r="44" fill="#00FFFF" fill-opacity="0.25"/>
    <circle cx="42" cy="60" r="44" fill="none" stroke="#00FFFF" stroke-width="5" class="glow-stroke"/>
  </g>

  <!-- Yellow ring (right) -->
  <g class="pulse-ring">
    <circle cx="78" cy="60" r="44" fill="#FFEA00" fill-opacity="0.25"/>
    <circle cx="78" cy="60" r="44" fill="none" stroke="#FFEA00" stroke-width="5" class="glow-stroke"/>
  </g>
</svg>